<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tectika · Multi-Agent Research</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='28'%3E🔎%3C/text%3E%3C/svg%3E" />
  <script defer src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <style>
    /* ----------  THEME TOKENS ---------- */
    :root {
      --bg: #0f1419;
      --card: #1a2129;
      --card-hi: #1f2731;
      --border: #2a3441;
      --text: #e6edf3;
      --muted: #8b95a4;
      --accent: #4dabf7;
      --accent-hover: #74c0fc;
      --error: #ff6b6b;
      --planner: #845ef7;
      --researcher: #4dabf7;
      --aggregator: #f59f00;
      --writer: #51cf66;
    }

    /* ----------  RESET / BASE ---------- */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ----------  LAYOUT ---------- */
    .container {
      max-width: 880px;
      margin: 0 auto;
      padding: 48px 24px 96px;
    }
    header { margin-bottom: 32px; }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }
    .subtitle {
      color: var(--muted);
      font-size: 15px;
      margin: 0;
    }

    /* ----------  SEARCH BAR ---------- */
    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .search-bar input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-bar input:focus { border-color: var(--accent); }
    .search-bar input:disabled { opacity: 0.6; }
    .search-bar button {
      background: var(--accent);
      color: #0f1419;
      border: none;
      padding: 14px 24px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .search-bar button:hover:not(:disabled) { background: var(--accent-hover); }
    .search-bar button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ----------  STATUS BANNERS ---------- */
    .status {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .status .elapsed { margin-left: auto; font-variant-numeric: tabular-nums; font-size: 13px; }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      background: rgba(255, 107, 107, 0.08);
      border-color: var(--error);
      color: var(--error);
    }

    /* ----------  SECTIONS ---------- */
    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 32px 0 12px;
      font-weight: 600;
    }

    /* ----------  TRACE LIST ---------- */
    .trace-list { display: flex; flex-direction: column; gap: 12px; }
    .trace-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
    }
    .trace-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border-radius: 4px;
      color: #fff;
    }
    .badge.Planner    { background: var(--planner); }
    .badge.Researcher { background: var(--researcher); color: #0f1419; }
    .badge.Aggregator { background: var(--aggregator); color: #0f1419; }
    .badge.Writer     { background: var(--writer); color: #0f1419; }
    .trace-action { color: var(--muted); font-size: 13px; }
    .trace-meta { font-size: 12px; color: var(--muted); margin-left: auto; font-variant-numeric: tabular-nums; }
    .trace-input { font-weight: 600; margin: 4px 0 8px; color: var(--text); }
    .trace-output {
      color: var(--muted);
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ----------  REPORT ---------- */
    .report {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      margin-top: 12px;
    }
    .report h1, .report h2, .report h3, .report h4 {
      margin-top: 24px;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }
    .report h1:first-child, .report h2:first-child { margin-top: 0; }
    .report h1 { font-size: 24px; }
    .report h2 { font-size: 19px; color: var(--accent); }
    .report h3 { font-size: 16px; }
    .report p { margin: 12px 0; }
    .report ul, .report ol { padding-left: 24px; margin: 12px 0; }
    .report li { margin: 4px 0; }
    .report code {
      background: rgba(255, 255, 255, 0.06);
      padding: 2px 5px;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .report strong { color: var(--text); }
    .report hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    .meta-bar {
      margin-top: 16px;
      padding: 12px 20px;
      background: var(--card-hi);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      color: var(--muted);
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      font-variant-numeric: tabular-nums;
    }
    .meta-bar strong { color: var(--text); font-weight: 600; }

    /* ----------  UTILS ---------- */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <main class="container">

    <header>
      <h1>Tectika Multi-Agent Research</h1>
      <p class="subtitle">
        A 5-agent pipeline (Planner → Researchers → Aggregator → Writer)
        powered by Azure OpenAI GPT-4o.
      </p>
    </header>

    <form class="search-bar" id="research-form">
      <input
        type="text"
        id="topic-input"
        placeholder="e.g. The impact of LLMs on backend engineering workflows"
        autocomplete="off"
        required
        minlength="3"
      />
      <button type="submit" id="submit-btn">Research</button>
    </form>

    <div id="status" class="status hidden" role="status" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
      <div>Researching… this typically takes 45–60 seconds while five agents run.</div>
      <div class="elapsed" id="elapsed">0.0 s</div>
    </div>

    <div id="error" class="status error hidden" role="alert"></div>

    <section id="trace-section" class="hidden" aria-labelledby="trace-title">
      <div class="section-title" id="trace-title">Research Process</div>
      <div id="trace-list" class="trace-list"></div>
    </section>

    <section id="report-section" class="hidden" aria-labelledby="report-title">
      <div class="section-title" id="report-title">Final Report</div>
      <article id="report" class="report"></article>
      <div id="meta" class="meta-bar"></div>
    </section>

  </main>

  <script>
    /* ==========================================================
       Tectika frontend — vanilla ES2020, no framework
       Talks to:  POST /run  →  { report, agent_trace[], meta }
       ========================================================== */

    // ---------- DOM lookups ----------
    const $ = (id) => document.getElementById(id);
    const form          = $("research-form");
    const input         = $("topic-input");
    const submitBtn     = $("submit-btn");
    const statusEl      = $("status");
    const elapsedEl     = $("elapsed");
    const errorEl       = $("error");
    const traceSection  = $("trace-section");
    const traceList     = $("trace-list");
    const reportSection = $("report-section");
    const reportEl      = $("report");
    const metaEl        = $("meta");

    // ---------- tiny DOM helpers ----------
    const show = (el) => el.classList.remove("hidden");
    const hide = (el) => el.classList.add("hidden");

    function escapeHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function snippet(text, max = 320) {
      const t = String(text ?? "").trim();
      if (t.length <= max) return t;
      return t.slice(0, max).replace(/\s+\S*$/, "") + "…";
    }

    // ---------- renderers ----------
    function renderTraceCard(entry) {
      const card = document.createElement("div");
      card.className = "trace-card";
      const totalToks = entry.tokens?.total_tokens ?? 0;
      const dur = (entry.duration_ms ?? 0).toFixed(0);
      card.innerHTML = `
        <div class="trace-card-header">
          <span class="badge ${escapeHtml(entry.agent)}">${escapeHtml(entry.agent)}</span>
          <span class="trace-action">${escapeHtml(entry.action)}</span>
          <span class="trace-meta">${dur} ms · ${totalToks.toLocaleString()} toks</span>
        </div>
        <div class="trace-input">${escapeHtml(entry.input_summary)}</div>
        <div class="trace-output">${escapeHtml(snippet(entry.output_summary || entry.output))}</div>
      `;
      return card;
    }

    function renderReport(markdown) {
      // marked may not be loaded if CDN is blocked — fall back to text.
      if (window.marked && typeof window.marked.parse === "function") {
        reportEl.innerHTML = window.marked.parse(markdown ?? "");
      } else {
        reportEl.textContent = markdown ?? "";
      }
    }

    function renderMeta(meta) {
      const t = meta?.tokens ?? {};
      metaEl.innerHTML = `
        <span><strong>Duration:</strong> ${(meta.duration_ms / 1000).toFixed(1)} s</span>
        <span><strong>Total tokens:</strong> ${(t.total_tokens ?? 0).toLocaleString()}</span>
        <span><strong>Input:</strong> ${(t.input_tokens ?? 0).toLocaleString()}</span>
        <span><strong>Output:</strong> ${(t.output_tokens ?? 0).toLocaleString()}</span>
      `;
    }

    // ---------- state machine ----------
    function clearResults() {
      hide(errorEl);
      hide(traceSection);
      hide(reportSection);
      traceList.replaceChildren();
      reportEl.replaceChildren();
      metaEl.replaceChildren();
    }

    let elapsedTimer = null;
    function startLoading() {
      submitBtn.disabled = true;
      input.disabled = true;
      submitBtn.textContent = "Researching…";
      const started = performance.now();
      elapsedEl.textContent = "0.0 s";
      show(statusEl);
      elapsedTimer = setInterval(() => {
        elapsedEl.textContent = ((performance.now() - started) / 1000).toFixed(1) + " s";
      }, 100);
    }

    function stopLoading() {
      submitBtn.disabled = false;
      input.disabled = false;
      submitBtn.textContent = "Research";
      hide(statusEl);
      if (elapsedTimer) {
        clearInterval(elapsedTimer);
        elapsedTimer = null;
      }
    }

    function showError(message) {
      errorEl.textContent = `Something went wrong: ${message}`;
      show(errorEl);
    }

    // ---------- backend call ----------
    async function runPipeline(topic) {
      const res = await fetch("/run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ topic }),
      });

      if (!res.ok) {
        // Try to surface FastAPI's structured `detail`, fall back to status code.
        let detail = `HTTP ${res.status}`;
        try {
          const err = await res.json();
          if (err.detail) {
            detail = typeof err.detail === "string"
              ? err.detail
              : JSON.stringify(err.detail);
          }
        } catch { /* non-JSON body — keep status code */ }
        throw new Error(detail);
      }
      return res.json();
    }

    // ---------- form submit ----------
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const topic = input.value.trim();
      if (topic.length < 3) return;

      clearResults();
      startLoading();

      try {
        const data = await runPipeline(topic);

        for (const entry of data.agent_trace ?? []) {
          traceList.appendChild(renderTraceCard(entry));
        }
        if (traceList.children.length) show(traceSection);

        renderReport(data.report);
        renderMeta(data.meta);
        show(reportSection);
      } catch (err) {
        showError(err?.message || "Unknown error");
      } finally {
        stopLoading();
      }
    });
  </script>
</body>
</html>
